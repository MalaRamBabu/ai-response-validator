[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke:      Quick sanity checks
    regression: Full regression suite
    safety:     Safety and content tests
    factual:    Factual accuracy tests
    edge:       Edge case tests

addopts =
    -v
    --tb=short
    --html=reports/test_report.html
    --self-contained-html

timeout = 30
